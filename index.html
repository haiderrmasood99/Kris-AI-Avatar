<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kris AI Avatar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #101114;
        --panel: #191b20;
        --panel-soft: #20242c;
        --text: #f7f8fb;
        --muted: #a9b0bd;
        --accent: #43d9ad;
        --accent-strong: #2fb68f;
        --border: #303642;
        --danger: #ff7474;
      }

      body.light-mode {
        color-scheme: light;
        --bg: #f5f7fb;
        --panel: #ffffff;
        --panel-soft: #eef2f7;
        --text: #151922;
        --muted: #566070;
        --accent: #0b8f6b;
        --accent-strong: #096e54;
        --border: #d7dde8;
        --danger: #b42318;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(960px, calc(100% - 32px));
        margin: 0 auto;
        padding: 36px 0;
      }

      .shell {
        display: grid;
        grid-template-columns: minmax(280px, 380px) 1fr;
        gap: 24px;
        align-items: stretch;
      }

      .stage,
      .console {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
      }

      .stage {
        display: grid;
        place-items: center;
        padding: 28px;
      }

      .video-frame {
        position: relative;
        width: min(320px, 74vw);
        aspect-ratio: 1;
        overflow: hidden;
        border-radius: 50%;
        background: var(--panel-soft);
        border: 4px solid var(--accent);
      }

      #idle-video,
      #talk-video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        background: #000;
      }

      #talk-video {
        display: none;
      }

      .console {
        display: flex;
        flex-direction: column;
        gap: 22px;
        padding: 28px;
      }

      .title-block h1 {
        margin: 0;
        font-size: clamp(2rem, 5vw, 3.5rem);
        letter-spacing: 0;
        line-height: 1;
      }

      .title-block p {
        max-width: 58ch;
        margin: 12px 0 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      button {
        min-height: 44px;
        border: 0;
        border-radius: 8px;
        padding: 0 16px;
        background: var(--panel-soft);
        color: var(--text);
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button.primary,
      #connect-button.connected {
        background: var(--accent);
        color: #07110e;
      }

      button:hover:not(:disabled) {
        filter: brightness(1.06);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      #connect-button.loading {
        position: relative;
        color: transparent;
      }

      #connect-button.loading::after,
      #input-container.loading::after {
        content: "";
        position: absolute;
        width: 16px;
        height: 16px;
        border: 2px solid currentColor;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      #connect-button.loading::after {
        top: 50%;
        left: 50%;
        color: #07110e;
        transform: translate(-50%, -50%);
      }

      #input-container {
        position: relative;
      }

      #user-input-field {
        width: 100%;
        min-height: 54px;
        padding: 0 96px 0 16px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--panel-soft);
        color: var(--text);
        font: inherit;
      }

      #user-input-field:focus {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      #enter-button {
        position: absolute;
        top: 5px;
        right: 5px;
        background: var(--accent);
        color: #07110e;
      }

      #input-container.loading::after {
        top: 19px;
        right: 78px;
        color: var(--accent);
      }

      .status-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .status-item {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--panel-soft);
        color: var(--muted);
        font-size: 0.9rem;
      }

      .status-value {
        color: var(--text);
        font-weight: 700;
      }

      #error-message {
        margin: 0;
        padding: 12px 14px;
        border: 1px solid color-mix(in srgb, var(--danger) 50%, transparent);
        border-radius: 8px;
        color: var(--danger);
        background: color-mix(in srgb, var(--danger) 12%, transparent);
      }

      #error-message[hidden] {
        display: none;
      }

      @keyframes spin {
        to {
          transform: translate(-50%, -50%) rotate(360deg);
        }
      }

      @media (max-width: 760px) {
        main {
          width: min(100% - 20px, 520px);
          padding: 10px 0;
        }

        .shell {
          grid-template-columns: 1fr;
          gap: 10px;
        }

        .stage,
        .console {
          padding: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="shell">
        <section class="stage" aria-label="Avatar video">
          <div class="video-frame">
            <video id="idle-video" src="./oracle_Idle.mp4" autoplay muted loop playsinline></video>
            <video id="talk-video" autoplay playsinline></video>
          </div>
        </section>

        <section class="console" aria-label="Avatar controls">
          <div class="title-block">
            <h1>Kris AI Avatar</h1>
            <p>Connect to the D-ID stream, ask a question, and let the avatar speak the OpenAI response.</p>
          </div>

          <p id="error-message" hidden></p>

          <div id="input-container">
            <input type="text" id="user-input-field" placeholder="Ask Kris anything" autocomplete="off" />
            <button id="enter-button" class="primary" type="button">Send</button>
          </div>

          <div class="controls">
            <button id="connect-button" class="primary" type="button">Connect</button>
            <button id="destroy-button" type="button" disabled>Disconnect</button>
            <button id="theme-toggle" type="button">Theme</button>
          </div>

          <div class="status-grid" aria-label="Connection status">
            <div class="status-item"><span>Peer</span><span id="peer-status-label" class="status-value">disconnected</span></div>
            <div class="status-item"><span>ICE</span><span id="ice-status-label" class="status-value">disconnected</span></div>
            <div class="status-item"><span>Signaling</span><span id="signaling-status-label" class="status-value">stable</span></div>
            <div class="status-item"><span>Stream</span><span id="streaming-status-label" class="status-value">disconnected</span></div>
          </div>
        </section>
      </div>
    </main>

    <script type="module" src="./streaming-client-api.js"></script>
  </body>
</html>
